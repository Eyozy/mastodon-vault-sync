# ===============================================================
# Mastodon 本地备份工具 - 配置文件 (本地运行用)
# 运行在 GitHub Actions 时，程序会优先使用环境变量，此文件不会被读取。
# 本地运行步骤：
#   1. 复制本文件为 "config.yaml"
#   2. 先准备好实例地址、用户 ID、访问令牌
#   3. 再填写 mastodon 下的 3 个字段
#   4. 按需要调整 backup 和 sync
#   5. 在仓库根目录执行 `python3 main.py sync` 或 `python3 main.py sync --full`
# 获取方法：
#   - 实例地址: 你平时打开 Mastodon 时的域名，例如 https://mastodon.social
#   - 用户 ID: 访问 https://<实例地址>/api/v1/accounts/lookup?acct=<用户名>，复制返回 JSON 里的 "id"
#   - 访问令牌: Mastodon -> 首选项 -> 开发 -> 新建应用，只勾 read:statuses，创建后复制 token
# `config.yaml` 必须放在项目根目录，程序只会读取这个固定文件名。
# ===============================================================

mastodon:
  # 你的 Mastodon 实例 URL。
  # 只填协议 + 域名，例如: "https://mastodon.social"
  # 不要填写个人主页链接，例如 "https://mastodon.social/@yourname"
  instance_url: "https://mastodon.social"

  # 你的 Mastodon 用户 ID，必须是一串纯数字，不是用户名。
  # 获取方法：
  #   1. 打开 https://<你的实例地址>/api/v1/accounts/lookup?acct=<你的用户名>
  #   2. 例如 https://mastodon.social/api/v1/accounts/lookup?acct=YourUsername
  #   3. 在返回 JSON 中找到 "id": "123456789012345678"
  #   4. 把这串数字填到下面
  user_id: "YOUR_USER_ID"

  # 你的 Mastodon API 访问令牌
  # 获取方法：
  #   1. 登录 Mastodon
  #   2. 进入 首选项 -> 开发 -> 新建应用
  #   3. Redirect URI 填 urn:ietf:wg:oauth:2.0:oob
  #   4. 权限只勾 read:statuses
  #   5. 创建应用后复制 access token
  access_token: "YOUR_ACCESS_TOKEN"

backup:
  # 本地备份的绝对路径
  # Windows 示例: "C:/Users/YourUser/Documents/backup"
  # macOS/Linux 示例: "/Users/yourname/Documents/backup"
  # 使用 "." 表示直接写入当前仓库根目录

  path: "."
  # 在本地中用于存放 Mastodon 笔记的文件夹名称
  # 如果文件夹不存在，程序会自动创建
  posts_folder: "mastodon"
  # 汇总归档文件名
  filename: "archive.md"
  # 媒体文件保存目录
  media_folder: "media"

# ===============================================================
# 高级设置
# ===============================================================
sync:
  # 用于记录上次同步状态的文件名
  state_file: "sync_state.json"

  # 时区设置：控制备份文件和网页中显示的时间
  # - true: 使用中国时区 (GMT+8)，时间会自动转换为北京时间
  # - false: 使用 UTC 时区 (协调世界时)
  # 默认值：false
  #
  # 示例：如果 Mastodon API 返回时间为 2025-01-15T06:30:00.000Z (UTC)
  #   - china_timezone: false → 显示 "2025-01-15 06:30:00"
  #   - china_timezone: true  → 显示 "2025-01-15 14:30:00" (UTC+8)
  china_timezone: false
