name: Mastodon Vault Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cleanup script
        env:
          GITHUB_ACTIONS: "true"
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_USER_ID: ${{ secrets.MASTODON_USER_ID }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          ARCHIVE_FILENAME: ${{ secrets.ARCHIVE_FILENAME }}
          POSTS_FOLDER: mastodon
          MEDIA_FOLDER: media
          CHINA_TIMEZONE: ${{ secrets.CHINA_TIMEZONE || 'false' }}
        run: python main.py cleanup

      - name: Commit and push changes
        run: |
          if [[ -z $(git status --porcelain) ]]; then
            echo "No deleted posts found to cleanup."
            exit 0
          fi

          echo "Pushing cleanup changes to current repository..."
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Automated cleanup: Remove deleted posts"
          git push
